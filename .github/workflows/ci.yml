name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install RE2 (macOS)
        if: runner.os == 'macOS'
        run: brew install re2 abseil mimalloc

      - name: Install RE2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libre2-dev libabsl-dev

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Run Node.js tests
        run: npm test

      - name: Run compat tests
        run: npm run test:compat

      - name: Run Standard Schema tests
        run: npm run test:standard-schema

  test-windows-build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        node: [22]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64) with Node.js
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-nodejs
            git
            base-devel

      - name: Create .npmrc with token
        run: |
          echo "cmake_js_G=Ninja" > .npmrc

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Run Node.js tests
        run: npm test

      - name: Run compat tests
        run: npm run test:compat

      - name: Run Standard Schema tests
        run: npm run test:standard-schema

  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RE2
        run: sudo apt-get update && sudo apt-get install -y libre2-dev libabsl-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run C++ tests
        run: ./build/ata_tests

  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install RE2
        run: sudo apt-get update && sudo apt-get install -y libre2-dev libabsl-dev

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Run JSON Schema Test Suite
        run: npm run test:suite
