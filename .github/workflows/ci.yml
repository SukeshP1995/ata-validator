name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Run Node.js tests
        run: npm test

      - name: Run compat tests
        run: npm run test:compat

  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run C++ tests
        run: ./build/ata_tests

  test-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build native addon
        run: npm run build

      - name: Clone JSON Schema Test Suite
        run: git clone --depth 1 https://github.com/json-schema-org/JSON-Schema-Test-Suite.git tests/suite

      - name: Run JSON Schema Test Suite
        run: npm run test:suite
